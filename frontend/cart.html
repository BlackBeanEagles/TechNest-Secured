<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <title>Cart — TechNest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"
          integrity="sha512-5g2Nj3mqLOgClHi20oat1COW7jWvf7SyqnvwWUsMDwhjHeqeTl0C+uzjucLweruQxHbhDwiPLXlm8HBO0011pA=="
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <a href="/index.html" class="flex items-center gap-2">
        <div class="w-8 h-8 bg-cyan-500 rounded-lg flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
        <span class="text-xl font-bold text-white">Tech<span class="text-cyan-400">Nest</span></span>
      </a>
      <div class="flex items-center gap-4">
        <a href="/index.html" class="text-gray-400 hover:text-white text-sm transition-colors">← Shop</a>
        <a href="/orders.html" class="text-gray-400 hover:text-white text-sm transition-colors">My Orders</a>
        <button id="logoutBtn" class="text-red-400 hover:text-red-300 text-sm transition-colors">Logout</button>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-6 py-10">
    <h1 class="text-3xl font-bold text-white mb-8">Shopping Cart</h1>

    <!-- Loading -->
    <div id="loadingCart" class="flex justify-center py-20">
      <div class="spinner"></div>
    </div>

    <!-- Empty cart -->
    <div id="emptyCart" class="hidden text-center py-20">
      <svg class="w-20 h-20 text-gray-700 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
      </svg>
      <p class="text-gray-400 text-xl font-medium">Your cart is empty</p>
      <a href="/index.html" class="inline-block mt-4 bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-2.5 rounded-lg font-semibold transition-colors">
        Browse Products
      </a>
    </div>

    <!-- Cart content -->
    <div id="cartSummary" class="hidden">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

        <!-- Cart items -->
        <div class="lg:col-span-2 space-y-4" id="cartItems"></div>

        <!-- Order summary panel -->
        <div class="lg:col-span-1">
          <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 sticky top-24">
            <h2 class="text-lg font-bold text-white mb-5">Order Summary</h2>

            <div class="space-y-3 text-sm mb-5">
              <div class="flex justify-between text-gray-300">
                <span id="itemCount">0 items</span>
                <span id="cartTotal">$0.00</span>
              </div>
              <div class="flex justify-between text-gray-300">
                <span>Shipping</span>
                <span class="text-green-400 font-medium">Free</span>
              </div>
              <div class="flex justify-between text-gray-300">
                <span>Tax (8%)</span>
                <span id="taxAmount">$0.00</span>
              </div>
              <div class="border-t border-gray-700 pt-3 flex justify-between text-white font-bold text-lg">
                <span>Total</span>
                <span id="grandTotal" class="text-cyan-400">$0.00</span>
              </div>
            </div>

            <!-- Checkout form -->
            <form id="checkoutForm" novalidate>
              <div class="mb-4">
                <label for="shippingAddress" class="block text-sm font-medium text-gray-300 mb-2">
                  Shipping Address <span class="text-red-400">*</span>
                </label>
                <textarea id="shippingAddress" name="shippingAddress" rows="3"
                          class="form-input border-gray-600 resize-none"
                          placeholder="123 Main St, City, State, ZIP"
                          maxlength="500" required></textarea>
                <p class="text-gray-600 text-xs mt-1">Min 10 characters</p>
              </div>

              <button type="submit" id="placeOrderBtn" class="btn-primary py-3 text-base">
                Place Order
              </button>
            </form>

            <!-- Security badges -->
            <div class="flex flex-wrap gap-2 mt-4">
              <span class="security-badge text-xs">🔒 SSL Secured</span>
              <span class="security-badge text-xs">🛡️ CSRF Token</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/validation.js"></script>
  <script src="/js/cart.js"></script>
  <script>
    document.getElementById('logoutBtn')?.addEventListener('click', async () => {
      await apiFetch('/auth/logout', { method: 'POST' });
      clearCurrentUser();
      window.location.href = '/login.html';
    });
  </script>
</body>
</html>
