<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <title>My Orders — TechNest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"
          integrity="sha512-5g2Nj3mqLOgClHi20oat1COW7jWvf7SyqnvwWUsMDwhjHeqeTl0C+uzjucLweruQxHbhDwiPLXlm8HBO0011pA=="
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <nav class="navbar px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <a href="/index.html" class="flex items-center gap-2">
        <div class="w-8 h-8 bg-cyan-500 rounded-lg flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
        <span class="text-xl font-bold text-white">Tech<span class="text-cyan-400">Nest</span></span>
      </a>
      <div class="flex items-center gap-4">
        <a href="/index.html" class="text-gray-400 hover:text-white text-sm transition-colors">← Shop</a>
        <a href="/cart.html" class="text-gray-400 hover:text-white text-sm transition-colors">Cart</a>
        <button id="logoutBtn" class="text-red-400 hover:text-red-300 text-sm transition-colors">Logout</button>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-6 py-10">
    <h1 class="text-3xl font-bold text-white mb-8">My Orders</h1>

    <div id="loadingOrders" class="flex justify-center py-20">
      <div class="spinner"></div>
    </div>

    <div id="emptyOrders" class="hidden text-center py-20">
      <svg class="w-20 h-20 text-gray-700 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      <p class="text-gray-400 text-xl font-medium">No orders yet</p>
      <a href="/index.html" class="inline-block mt-4 bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-2.5 rounded-lg font-semibold transition-colors">
        Start Shopping
      </a>
    </div>

    <div id="ordersList" class="hidden space-y-6"></div>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/validation.js"></script>
  <script>
    document.getElementById('logoutBtn')?.addEventListener('click', async () => {
      await apiFetch('/auth/logout', { method: 'POST' });
      clearCurrentUser();
      window.location.href = '/login.html';
    });

    const STATUS_COLORS = {
      pending:    'bg-yellow-900 text-yellow-400',
      processing: 'bg-blue-900 text-blue-400',
      shipped:    'bg-indigo-900 text-indigo-400',
      delivered:  'bg-green-900 text-green-400',
      cancelled:  'bg-red-900 text-red-400'
    };

    document.addEventListener('DOMContentLoaded', async () => {
      requireAuth();

      const loading  = document.getElementById('loadingOrders');
      const empty    = document.getElementById('emptyOrders');
      const list     = document.getElementById('ordersList');

      try {
        const res  = await apiFetch('/orders');
        if (!res) return;
        const data = await res.json();

        loading.classList.add('hidden');

        if (!data.orders?.length) {
          empty.classList.remove('hidden');
          return;
        }

        list.classList.remove('hidden');

        for (const order of data.orders) {
          const card = document.createElement('div');
          card.className = 'bg-gray-800 border border-gray-700 rounded-xl overflow-hidden';

          // Header
          const header = document.createElement('div');
          header.className = 'flex items-center justify-between px-6 py-4 bg-gray-750 border-b border-gray-700';

          const orderInfo = document.createElement('div');
          const orderNum  = document.createElement('p');
          orderNum.className = 'text-white font-bold';
          orderNum.textContent = `Order #${order.id}`;

          const orderDate = document.createElement('p');
          orderDate.className = 'text-gray-400 text-sm';
          orderDate.textContent = formatDate(order.created_at);

          orderInfo.append(orderNum, orderDate);

          const rightInfo = document.createElement('div');
          rightInfo.className = 'text-right';

          const statusBadge = document.createElement('span');
          statusBadge.className = `px-3 py-1 rounded-full text-xs font-semibold ${STATUS_COLORS[order.status] || 'bg-gray-700 text-gray-400'}`;
          statusBadge.textContent = order.status.charAt(0).toUpperCase() + order.status.slice(1);

          const totalEl = document.createElement('p');
          totalEl.className = 'text-cyan-400 font-bold text-lg mt-1';
          totalEl.textContent = formatPrice(order.total);

          rightInfo.append(statusBadge, totalEl);
          header.append(orderInfo, rightInfo);

          // Items
          const body = document.createElement('div');
          body.className = 'px-6 py-4';

          if (order.items?.length) {
            const itemsTitle = document.createElement('p');
            itemsTitle.className = 'text-gray-400 text-xs font-semibold uppercase tracking-wide mb-3';
            itemsTitle.textContent = `${order.items.length} item${order.items.length !== 1 ? 's' : ''}`;
            body.appendChild(itemsTitle);

            const itemsList = document.createElement('div');
            itemsList.className = 'space-y-2';

            for (const item of order.items) {
              const row = document.createElement('div');
              row.className = 'flex justify-between items-center text-sm';

              const nameEl = document.createElement('span');
              nameEl.className = 'text-gray-300';
              // Use textContent — never innerHTML for server data
              nameEl.textContent = `${sanitizeText(item.product_name)} × ${item.quantity}`;

              const priceEl = document.createElement('span');
              priceEl.className = 'text-white font-medium';
              priceEl.textContent = formatPrice(item.price * item.quantity);

              row.append(nameEl, priceEl);
              itemsList.appendChild(row);
            }
            body.appendChild(itemsList);
          }

          // Shipping address
          const addrSection = document.createElement('div');
          addrSection.className = 'mt-4 pt-4 border-t border-gray-700';
          const addrLabel = document.createElement('p');
          addrLabel.className = 'text-gray-500 text-xs font-semibold uppercase tracking-wide mb-1';
          addrLabel.textContent = 'Shipped to';
          const addrText = document.createElement('p');
          addrText.className = 'text-gray-300 text-sm';
          addrText.textContent = sanitizeText(order.shipping_address);
          addrSection.append(addrLabel, addrText);
          body.appendChild(addrSection);

          card.append(header, body);
          list.appendChild(card);
        }
      } catch {
        loading.classList.add('hidden');
        showToast('Failed to load orders', 'error');
      }
    });
  </script>
</body>
</html>
